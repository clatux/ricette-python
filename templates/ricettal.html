{% extends "base.html" %}
{% block content %}

<h2>{{ ricetta.titolo }}</h2>

{% if ricetta.immagine %}
<img src="/static/img/{{ ricetta.immagine }}" class="img-fluid rounded mb-4">
{% endif %}

<h4>Ingredienti</h4>
<ul>
    {% for ing in ricetta.ingredienti.split(";") %}
    <li>{{ ing }}</li>
    {% endfor %}
</ul>

<h4 class="mt-4">Preparazione</h4>
<p>{{ ricetta.preparazione }}</p>

{% endblock %}
