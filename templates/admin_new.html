{% extends "base.html" %}
{% block content %}

{% include "search_bar.html" %}

<h2 class="mb-4">Nuova ricetta</h2>

<form method="post" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Titolo</label>
    <input type="text" name="titolo" class="form-control" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">Categoria</label>
    <input type="text" name="categoria" class="form-control" required>
  </div>

  <div class="col-12">
    <label class="form-label">Descrizione breve</label>
    <input type="text" name="descrizione" class="form-control">
  </div>

  <div class="col-12">
    <label class="form-label">Nome file foto (es: carbonara.jpg)</label>
    <input type="text" name="foto" class="form-control">
  </div>

  <div class="col-12">
    <label class="form-label">Ingredienti (HTML)</label>
    <textarea name="ingredienti" class="form-control" rows="5"></textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Procedimento (HTML)</label>
    <textarea name="procedimento" class="form-control" rows="6"></textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Conservazione (HTML)</label>
    <textarea name="conservazione" class="form-control" rows="3"></textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Note ingredienti</label>
    <textarea name="noteIngredienti" class="form-control" rows="2"></textarea>
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-success">Salva</button>
    <a href="/admin/dashboard" class="btn btn-secondary">Annulla</a>
  </div>
</form>

{% endblock %}
