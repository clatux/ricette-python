{% extends "base.html" %}
{% block content %}

<h2 class="mb-4">Modifica ricetta: {{ ricetta.titolo }}</h2>

<form method="post" class="row g-3">
  <div class="col-md-6">
    <label class="form-label">Titolo</label>
    <input type="text" name="titolo" class="form-control" value="{{ ricetta.titolo }}" required>
  </div>

  <div class="col-md-6">
    <label class="form-label">Categoria</label>
    <input type="text" name="categoria" class="form-control" value="{{ ricetta.categoria }}" required>
  </div>

  <div class="col-12">
    <label class="form-label">Descrizione breve</label>
    <input type="text" name="descrizione" class="form-control" value="{{ ricetta.descrizione }}">
  </div>

  <div class="col-12">
    <label class="form-label">Nome file foto</label>
    <input type="text" name="foto" class="form-control" value="{{ ricetta.foto }}">
  </div>

  <div class="col-12">
    <label class="form-label">Ingredienti (HTML)</label>
    <textarea name="ingredienti" class="form-control" rows="5">{{ ricetta.ingredienti }}</textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Procedimento (HTML)</label>
    <textarea name="procedimento" class="form-control" rows="6">{{ ricetta.procedimento }}</textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Conservazione (HTML)</label>
    <textarea name="conservazione" class="form-control" rows="3">{{ ricetta.conservazione }}</textarea>
  </div>

  <div class="col-12">
    <label class="form-label">Note ingredienti</label>
    <textarea name="noteIngredienti" class="form-control" rows="2">{{ ricetta.noteIngredienti }}</textarea>
  </div>

  <div class="col-12">
    <button type="submit" class="btn btn-primary">Salva modifiche</button>
    <a href="/admin/dashboard" class="btn btn-secondary">Annulla</a>
  </div>
</form>

{% endblock %}
